events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name localhost;

        # 1. Launch Website
        location / {
            proxy_pass http://launch:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 2. UI App (SPA)
        location /app {
            if ($request_uri = "/app") { return 301 /app/; }
        }
        location /app/ {
            proxy_pass http://ui:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 3. Test App (SPA)
        location /test {
            if ($request_uri = "/test") { return 301 /test/; }
        }
        location /test/ {
            proxy_pass http://test:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 4. API Gateway
        location /gateway/ {
            proxy_pass http://api-gateway:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket Support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 4.1 Swagger UI & API Docs (Routes needed by Swagger to load correctly)
        location /webjars/ { proxy_pass http://api-gateway:5000/webjars/; }
        location /v3/api-docs/ { proxy_pass http://api-gateway:5000/v3/api-docs/; }
        location /authservice/ { proxy_pass http://api-gateway:5000/authservice/; }
        location /controlplaneservice/ { proxy_pass http://api-gateway:5000/controlplaneservice/; }
        location /sdkservice/ { proxy_pass http://api-gateway:5000/sdkservice/; }

        # 4.2 Actual API Routes for Swagger execution and direct access
        location /apiAuth/ { proxy_pass http://api-gateway:5000/apiAuth/; }
        location /apiControl/ { proxy_pass http://api-gateway:5000/apiControl/; }
        location /apiSdk/ { proxy_pass http://api-gateway:5000/apiSdk/; }

        # 5. Registry Server (Eureka)
        location /registry {
            if ($request_uri = "/registry") { return 301 /registry/; }
        }
        location /registry/ {
            proxy_pass http://registry-server:4999/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Fix Registry Login Redirects
            proxy_redirect http://$host/login /registry/login;
            proxy_redirect https://$host/login /registry/login;
            proxy_redirect /login /registry/login;
            proxy_redirect http://$host/ /registry/;
            proxy_redirect https://$host/ /registry/;
            proxy_redirect / /registry/;
            
            # Allow cookies on root path so /eureka/ assets are authenticated
            proxy_cookie_path / /;
        }
        
        # 5.1 Registry Server Static Assets Fallback
        location /eureka/ { proxy_pass http://registry-server:4999/eureka/; }

        # 6. Grafana
        location /grafana/ {
            proxy_pass http://grafana:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
