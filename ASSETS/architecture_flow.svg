<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 575" width="100%">
  <defs>
    <!-- Glow and shadow filters -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- 3D Drop Shadow for the entire canvas card -->
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.65"/>
    </filter>

    <!-- Node background gradient -->
    <linearGradient id="node-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.98" />
    </linearGradient>

    <!-- Glowing laser path gradients -->
    <linearGradient id="laser-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.2"/>
    </linearGradient>

    <linearGradient id="laser-orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#fb923c" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0.2"/>
    </linearGradient>

    <linearGradient id="laser-green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#4ade80" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <style>
    /* Premium dark cyber-black canvas background */
    .bg-card {
      fill: #090d16;
      stroke: rgba(255, 255, 255, 0.08);
      stroke-width: 1.5;
      rx: 16px;
      filter: url(#card-shadow);
    }

    /* Nodes style */
    .node-box {
      fill: url(#node-grad);
      stroke: rgba(255, 255, 255, 0.15);
      stroke-width: 1.5;
      rx: 8px;
    }
    .node-box:hover {
      stroke: #38bdf8;
      stroke-width: 2;
    }
    
    .node-title {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 11.5px;
      font-weight: 700;
      fill: #f1f5f9;
    }
    
    .node-desc {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 9.5px;
      fill: #94a3b8;
    }

    /* Core Connection Line Categories (Color-coded and thick for high visibility) */
    .eval-line {
      fill: none;
      stroke: #0284c7;
      stroke-opacity: 0.35;
      stroke-width: 2.5px;
    }
    
    .registry-line {
      fill: none;
      stroke: #c084fc;
      stroke-opacity: 0.35;
      stroke-width: 2.5px;
      stroke-dasharray: 4 4;
    }
    
    .config-line {
      fill: none;
      stroke: #38bdf8;
      stroke-opacity: 0.35;
      stroke-width: 2.5px;
      stroke-dasharray: 6 3;
    }

    .db-line {
      fill: none;
      stroke: #34d399;
      stroke-opacity: 0.35;
      stroke-width: 2.5px;
    }

    .telemetry-line {
      fill: none;
      stroke: #facc15;
      stroke-opacity: 0.25;
      stroke-width: 2px;
      stroke-dasharray: 3 6;
    }

    /* Animated Laser Pulses */
    .pulse-blue {
      fill: none;
      stroke: url(#laser-blue);
      stroke-width: 3.5;
      stroke-dasharray: 60 180;
      animation: flowForward 4s linear infinite;
      filter: url(#neon-glow);
    }
    
    .pulse-orange {
      fill: none;
      stroke: url(#laser-orange);
      stroke-width: 3.5;
      stroke-dasharray: 60 180;
      animation: flowForward 5s linear infinite;
      filter: url(#neon-glow);
    }

    .pulse-green {
      fill: none;
      stroke: url(#laser-green);
      stroke-width: 3.5;
      stroke-dasharray: 60 180;
      animation: flowForward 6s linear infinite;
      filter: url(#neon-glow);
    }

    .pulse-dash {
      fill: none;
      stroke: #eab308;
      stroke-width: 2.5;
      stroke-dasharray: 10 15;
      animation: dashFlow 20s linear infinite;
      filter: url(#neon-glow);
    }

    @keyframes flowForward {
      to { stroke-dashoffset: -240; }
    }

    @keyframes dashFlow {
      to { stroke-dashoffset: -1000; }
    }
  </style>

  <!-- Background Canvas Card (3D Rounded corner block, adjusted height to 555) -->
  <rect class="bg-card" x="10" y="10" width="1180" height="555" />

  <!-- Shifting all contents: 35px right, 30px down for perfect margins -->
  <g transform="translate(35, 30)">
    <!-- System Watermark Title (Top-Left Empty Space) -->
    <g transform="translate(20, 35)">
      <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24px" font-weight="400" fill="#ffffff">Rollout.io</text>
    </g>

    <!-- VISIBLE STATIC CONNECTION PATHS (THE ROADS) -->
    
    <!-- Evaluation Flow Road (Client -> Nginx -> SpringGateway -> SDK -> Redis) -->
    <path class="eval-line" d="M 160 335 L 210 280 L 350 280 L 400 280 L 540 280 L 590 200 L 730 200 L 970 200" />
    
    <!-- Additional Client (Zomato Clone) to Nginx baseline -->
    <path class="eval-line" d="M 160 225 L 210 280" />

    <!-- Spring Gateway to Auth Service and Control Plane Service (Corrected Route baselines) -->
    <path class="eval-line" d="M 540 280 L 590 120" />
    <path class="eval-line" d="M 540 280 L 590 360" />
    
    <!-- Eureka Service Registry connections (Gateway, Auth, SDK, ControlPlane, ConfigServer register) -->
    <path class="registry-line" d="M 470 315 L 470 390" /> <!-- Spring Gateway to Eureka -->
    <path class="registry-line" d="M 540 425 C 570 425, 570 395, 590 360" /> <!-- ControlPlane to Eureka -->
    <path class="registry-line" d="M 540 425 C 570 425, 570 235, 590 200" /> <!-- SDK Service to Eureka -->
    <path class="registry-line" d="M 540 425 C 570 425, 570 120, 590 120" /> <!-- Auth Service to Eureka -->
    <path class="registry-line" d="M 540 425 C 720 425, 750 440, 780 440" /> <!-- Config Server to Eureka -->

    <!-- Spring Cloud Config Server Distribution lines (All Services pull config) -->
    <path class="config-line" d="M 780 460 C 700 460, 700 395, 730 360" /> <!-- Config to ControlPlane -->
    <path class="config-line" d="M 780 460 C 710 400, 710 210, 730 200" /> <!-- Config to SDK Service -->
    <path class="config-line" d="M 780 460 C 720 400, 720 140, 730 120" /> <!-- Config to Auth Service -->
    <path class="config-line" d="M 780 460 C 500 490, 480 315, 540 280" /> <!-- Config -> Gateway -->

    <!-- Auth Service to MongoDB -->
    <path class="db-line" d="M 730 120 C 880 120, 920 200, 970 340" />
    
    <!-- SDK Service to MongoDB (Direct database fallback on cache miss) -->
    <path class="db-line" d="M 730 200 C 850 200, 900 300, 970 350" />

    <!-- Control Plane writes to MongoDB -->
    <path class="db-line" d="M 730 360 L 970 360" />

    <!-- SDK Service evaluates from Redis Cache -->
    <path class="db-line" d="M 730 200 L 970 200" style="stroke: #f87171;" />

    <!-- Firebase Auth identity validations -->
    <path class="eval-line" d="M 730 120 L 780 60" style="stroke: #f97316;" />
    
    <!-- Config Server pulls from Git source -->
    <path class="config-line" d="M 970 460 L 920 460" />

    <!-- RabbitMQ Broker inter-service event bus (Connects Auth and Control Plane, NOT SDK) -->
    <path class="eval-line" d="M 730 120 C 850 120, 900 200, 970 265" style="stroke: #fb923c;" /> <!-- Auth to MQ -->
    <path class="eval-line" d="M 730 360 C 850 360, 900 320, 970 295" style="stroke: #fb923c;" /> <!-- CP to MQ -->

    <!-- Telemetry gathering paths (Services to Prometheus/Grafana) -->
    <path class="telemetry-line" d="M 970 60 L 730 200 M 970 60 L 730 360 M 970 60 L 540 280" />


    <!-- DYNAMIC LASER and DASH FLOWS (pulsing on top of the roads) -->
    <!-- Evaluation Flow (Client -> Gateway -> SdkService -> Redis) -->
    <path class="pulse-blue" d="M 160 335 L 210 280 L 350 280 L 400 280 L 540 280 L 590 200 L 730 200 L 970 200" />
    
    <!-- Config updates broadcasting channel (Auth -> MQ -> ControlPlane) -->
    <path class="pulse-orange" d="M 730 120 C 850 120, 900 200, 970 265 L 970 295 C 900 320, 850 360, 730 360" />
    
    <!-- Config pull initialization stream (Git -> Config Server -> Control Plane) -->
    <path class="pulse-green" d="M 970 460 L 920 460 C 700 460, 700 395, 730 360" />
    
    <!-- Telemetry data flows (Services -> Telemetry Engine) -->
    <path class="pulse-dash" d="M 730 200 L 970 60 M 730 360 L 970 60 M 540 280 L 970 60" />


    <!-- MICROSERVICES NODES GRID -->
    
    <!-- LAYER 1: CLIENTS and FRONTEND -->
    <!-- 1. Zomato Clone (Test Integration) -->
    <g transform="translate(20, 190)">
      <rect class="node-box" width="140" height="70" />
      <text class="node-title" x="12" y="24">Zomato Clone</text>
      <text class="node-desc" x="12" y="42">Sample App Integration</text>
      <text class="node-desc" x="12" y="55">Vite / React client</text>
    </g>

    <!-- 2. Admin Control Dashboard -->
    <g transform="translate(20, 300)">
      <rect class="node-box" width="140" height="70" />
      <text class="node-title" x="12" y="24">Admin Console</text>
      <text class="node-desc" x="12" y="42">Workspace Manager</text>
      <text class="node-desc" x="12" y="55">React Admin / Vite UI</text>
    </g>


    <!-- LAYER 2: EDGE GATEWAYS -->
    <!-- 3. Nginx Edge Proxy -->
    <g transform="translate(210, 245)">
      <rect class="node-box" style="stroke: #38bdf8; stroke-width: 1.8;" width="140" height="70" />
      <text class="node-title" x="12" y="24">Nginx Edge Gateway</text>
      <text class="node-desc" x="12" y="42">Domain Edge Proxy</text>
      <text class="node-desc" x="12" y="55">SSL / HTTPS Entry</text>
    </g>

    <!-- 4. Spring Cloud API Gateway -->
    <g transform="translate(400, 245)">
      <rect class="node-box" width="140" height="70" />
      <text class="node-title" x="12" y="24">Spring Gateway</text>
      <text class="node-desc" x="12" y="42">Spring Cloud Gateway</text>
      <text class="node-desc" x="12" y="55">Internal API Router</text>
    </g>

    <!-- 5. Eureka Service Registry -->
    <g transform="translate(400, 390)">
      <rect class="node-box" style="stroke: #a855f7;" width="140" height="70" />
      <text class="node-title" x="12" y="24">Eureka Discovery</text>
      <text class="node-desc" x="12" y="42">Service Registry</text>
      <text class="node-desc" x="12" y="55">Dynamic Registry Status</text>
    </g>


    <!-- LAYER 3: CORE MICROSERVICES -->
    <!-- 6. Auth Service -->
    <g transform="translate(590, 85)">
      <rect class="node-box" width="140" height="70" />
      <text class="node-title" x="12" y="24">Auth Service</text>
      <text class="node-desc" x="12" y="42">JWT Verification</text>
      <text class="node-desc" x="12" y="55">Context Isolation Logic</text>
    </g>

    <!-- 7. SDK Service -->
    <g transform="translate(590, 165)">
      <rect class="node-box" style="stroke: #4ade80; stroke-width: 1.8;" width="140" height="70" />
      <text class="node-title" x="12" y="24">SDK Service</text>
      <text class="node-desc" x="12" y="42">High-throughput API</text>
      <text class="node-desc" x="12" y="55">Evaluations Engine</text>
    </g>

    <!-- 8. Control Plane Service -->
    <g transform="translate(590, 325)">
      <rect class="node-box" width="140" height="70" />
      <text class="node-title" x="12" y="24">Control Plane</text>
      <text class="node-desc" x="12" y="42">Business Logic API</text>
      <text class="node-desc" x="12" y="55">Workspace Manager Backend</text>
    </g>


    <!-- LAYER 4: CLOUD CONFIG SERVER -->
    <!-- 9. Spring Cloud Config Server -->
    <g transform="translate(780, 425)">
      <rect class="node-box" style="stroke: #38bdf8;" width="140" height="70" />
      <text class="node-title" x="12" y="24">Config Server</text>
      <text class="node-desc" x="12" y="42">Spring Cloud Config</text>
      <text class="node-desc" x="12" y="55">Central Properties Server</text>
    </g>


    <!-- LAYER 5: STORAGE, MESSAGING and OUTSIDE COMPONENT -->
    <!-- 10. Firebase Auth -->
    <g transform="translate(780, 25)">
      <rect class="node-box" style="stroke: #fb923c;" width="140" height="70" />
      <text class="node-title" x="12" y="24">Firebase Auth</text>
      <text class="node-desc" x="12" y="42">Identity Provider</text>
      <text class="node-desc" x="12" y="55">Dashboard Authentication</text>
    </g>

    <!-- 11. Redis Cache -->
    <g transform="translate(970, 165)">
      <rect class="node-box" style="stroke: #f87171;" width="140" height="70" />
      <text class="node-title" x="12" y="24">Redis Cache</text>
      <text class="node-desc" x="12" y="42">Flag Evaluation Cache</text>
      <text class="node-desc" x="12" y="55">In-Memory Data Store</text>
    </g>

    <!-- 12. RabbitMQ Message Broker -->
    <g transform="translate(970, 245)">
      <rect class="node-box" style="stroke: #fb923c;" width="140" height="70" />
      <text class="node-title" x="12" y="24">RabbitMQ</text>
      <text class="node-desc" x="12" y="42">Message Broker</text>
      <text class="node-desc" x="12" y="55">Inter-service Event Bus</text>
    </g>

    <!-- 13. MongoDB Database -->
    <g transform="translate(970, 325)">
      <rect class="node-box" style="stroke: #34d399;" width="140" height="70" />
      <text class="node-title" x="12" y="24">MongoDB</text>
      <text class="node-desc" x="12" y="42">Persistent Database</text>
      <text class="node-desc" x="12" y="55">Document Store</text>
    </g>

    <!-- 14. Config Git Repo -->
    <g transform="translate(970, 425)">
      <rect class="node-box" width="140" height="70" />
      <text class="node-title" x="12" y="24">External Config Git</text>
      <text class="node-desc" x="12" y="42">Secure Properties Source</text>
      <text class="node-desc" x="12" y="55">Versioned Remote Settings</text>
    </g>

    <!-- 15. Prometheus and Grafana Monitoring -->
    <g transform="translate(970, 25)">
      <rect class="node-box" style="stroke: #facc15;" width="140" height="70" />
      <text class="node-title" x="12" y="24">Metrics Monitor</text>
      <text class="node-desc" x="12" y="42">Prometheus and Grafana</text>
      <text class="node-desc" x="12" y="55">Observability Dashboard</text>
    </g>
  </g>
</svg>
