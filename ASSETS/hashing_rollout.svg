<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bluePurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <linearGradient id="purplePink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
    <linearGradient id="greenTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.85" />
    </linearGradient>
    
    <!-- Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.45" />
    </filter>
  </defs>

  <style>
    .title { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 15px; font-weight: 700; fill: #F8FAFC; }
    .label { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; font-weight: 600; fill: #94A3B8; }
    .value { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px; font-weight: bold; fill: #38BDF8; }
    .code { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 11px; fill: #E2E8F0; }
    .arrow-text { font-family: 'Inter', system-ui, sans-serif; font-size: 10px; fill: #64748B; font-weight: 600; text-anchor: middle; }
    .banner-text { font-family: 'Inter', system-ui, sans-serif; font-size: 13px; fill: #E2E8F0; }
    .banner-highlight { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: bold; }
  </style>

  <!-- Background Canvas -->
  <rect width="1000" height="380" rx="16" fill="#0B1329" stroke="#1E293B" stroke-width="2" />

  <!-- Outer Grid Details (Aesthetic) -->
  <circle cx="50" cy="50" r="2" fill="#334155" />
  <circle cx="950" cy="50" r="2" fill="#334155" />
  <circle cx="50" cy="330" r="2" fill="#334155" />
  <circle cx="950" cy="330" r="2" fill="#334155" />

  <!-- Step 1: Input Parameters -->
  <g transform="translate(40, 60)" filter="url(#shadow)">
    <rect width="240" height="160" rx="12" fill="url(#cardBg)" stroke="#334155" stroke-width="1.5" />
    <rect width="240" height="6" rx="3" fill="url(#bluePurple)" />
    <text x="20" y="32" class="title">1. Context Inputs</text>
    
    <text x="20" y="65" class="label">userId</text>
    <text x="20" y="82" class="value">"user_9827a"</text>
    
    <text x="20" y="115" class="label">flagKey</text>
    <text x="20" y="132" class="value">"zomato-dark-mode"</text>
  </g>

  <!-- Connection Line Step 1 -> 2 -->
  <g>
    <path d="M 280 140 L 350 140" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="4 4" />
    <polygon points="350,136 358,140 350,144" fill="#475569" />
    <text x="315" y="128" class="arrow-text">Concatenate</text>
  </g>

  <!-- Step 2: Hashing Engine -->
  <g transform="translate(360, 60)" filter="url(#shadow)">
    <rect width="280" height="160" rx="12" fill="url(#cardBg)" stroke="#475569" stroke-width="1.5" />
    <rect width="280" height="6" rx="3" fill="url(#purplePink)" />
    <text x="20" y="32" class="title">2. MurmurHash3 (32-bit)</text>
    
    <!-- Code Box (Made Wider to Avoid Text Overflow) -->
    <rect x="15" y="52" width="250" height="90" rx="8" fill="#020617" stroke="#1E293B" />
    <text x="25" y="78" class="code" fill="#94A3B8">String key = userId + ":" + flagKey;</text>
    <text x="25" y="98" class="code" fill="#94A3B8">int hash = MurmurHash3.hash(key);</text>
    <text x="25" y="122" class="code" fill="#F43F5E">// Output: 2,873,928,172</text>
  </g>

  <!-- Connection Line Step 2 -> 3 -->
  <g>
    <path d="M 640 140 L 710 140" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="4 4" />
    <polygon points="710,136 718,140 710,144" fill="#475569" />
    <text x="675" y="128" class="arrow-text">Modulo Math</text>
  </g>

  <!-- Step 3: Normalization & Bucketing -->
  <g transform="translate(720, 60)" filter="url(#shadow)">
    <rect width="240" height="160" rx="12" fill="url(#cardBg)" stroke="#334155" stroke-width="1.5" />
    <rect width="240" height="6" rx="3" fill="url(#greenTeal)" />
    <text x="20" y="32" class="title">3. Target Bucketing</text>
    
    <text x="20" y="65" class="label">Scale to Percentage (0-99)</text>
    <text x="20" y="82" class="value" fill="#10B981">2873928172 % 100 = 72</text>
    
    <text x="20" y="115" class="label">Configured Rollout</text>
    <text x="20" y="132" class="value" fill="#F59E0B">80% (Threshold: &lt; 80)</text>
  </g>

  <!-- Downward Logic Arrow -->
  <g>
    <path d="M 840 220 L 840 260" fill="none" stroke="#475569" stroke-width="2" />
    <polygon points="836,260 840,268 844,260" fill="#475569" />
    <text x="846" y="248" class="arrow-text" style="text-anchor: start;">Evaluate</text>
  </g>

  <!-- Final Resolution Status Bar -->
  <g transform="translate(40, 275)" filter="url(#shadow)">
    <rect width="920" height="65" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1.5" />
    <circle cx="35" cy="32.5" r="10" fill="#10B981" />
    
    <text x="65" y="37" font-family="'Outfit', 'Inter', sans-serif" font-size="14px" font-weight="700" fill="#F8FAFC">Deterministic Result:</text>
    
    <text x="220" y="37" class="banner-text">Since</text>
    <text x="260" y="37" class="banner-highlight" fill="#10B981">72 &lt; 80</text>
    <text x="325" y="37" class="banner-text">, user falls inside target threshold. Flag evaluates to</text>
    <text x="685" y="37" class="banner-highlight" fill="#10B981">TRUE (Variation Enabled)</text>
  </g>
</svg>
