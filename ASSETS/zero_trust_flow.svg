<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bluePurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <linearGradient id="purplePink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
    <linearGradient id="greenTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.95" />
    </linearGradient>
    
    <!-- Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <style>
    .title { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 15px; font-weight: 700; fill: #F8FAFC; }
    .label { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; font-weight: 600; fill: #94A3B8; }
    .value { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #F43F5E; }
    .jwt-header { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #10B981; font-weight: bold; }
    .arrow-text { font-family: 'Inter', system-ui, sans-serif; font-size: 10px; fill: #64748B; font-weight: 600; text-anchor: middle; }
    .explanation { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; fill: #94A3B8; }
  </style>

  <!-- Background Canvas -->
  <rect width="1000" height="420" rx="16" fill="#0B1329" stroke="#1E293B" stroke-width="2" />

  <!-- Outer Grid Details -->
  <circle cx="50" cy="50" r="2" fill="#334155" />
  <circle cx="950" cy="50" r="2" fill="#334155" />
  <circle cx="50" cy="370" r="2" fill="#334155" />
  <circle cx="950" cy="370" r="2" fill="#334155" />

  <!-- Connector Lines -->
  <!-- Client to Gateway -->
  <path d="M 270 145 L 340 145" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="4 4" />
  <polygon points="340,141 348,145 340,149" fill="#475569" />
  <text x="305" y="133" class="arrow-text">HTTPS</text>

  <!-- Gateway to Service Layer -->
  <path d="M 610 145 L 680 145" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="4 4" />
  <polygon points="680,141 688,145 680,149" fill="#475569" />
  <text x="645" y="133" class="arrow-text">Unmodified JWT</text>

  <!-- Service Layer down to DB -->
  <path d="M 825 230 L 825 280" fill="none" stroke="#10B981" stroke-width="2" />
  <polygon points="821,280 825,288 829,280" fill="#10B981" />
  <text x="838" y="260" class="arrow-text" style="text-anchor: start;">Secure Context Query</text>


  <!-- STEP 1: CLIENT REQUEST -->
  <g transform="translate(30, 60)" filter="url(#shadow)">
    <rect width="240" height="170" rx="12" fill="url(#cardBg)" stroke="#334155" stroke-width="1.5" />
    <rect width="240" height="6" rx="3" fill="url(#bluePurple)" />
    <text x="20" y="32" class="title">1. Authenticated Client</text>
    
    <text x="20" y="65" class="label">Outgoing Header:</text>
    <rect x="15" y="75" width="210" height="75" rx="6" fill="#020617" stroke="#1E293B" />
    <text x="25" y="95" class="jwt-header">Authorization:</text>
    <text x="25" y="112" class="value">Bearer eyJhbGciOi...</text>
    <text x="25" y="132" font-family="'Inter', sans-serif" font-size="10px" fill="#64748B">(Contains immutable user claim)</text>
  </g>

  <!-- STEP 2: API GATEWAY ROUTER -->
  <g transform="translate(350, 60)" filter="url(#shadow)">
    <rect width="260" height="170" rx="12" fill="url(#cardBg)" stroke="#475569" stroke-width="1.5" />
    <rect width="260" height="6" rx="3" fill="url(#purplePink)" />
    <text x="20" y="32" class="title">2. Edge Gateway Proxy</text>
    
    <text x="20" y="65" class="label">Security Treatment:</text>
    <text x="20" y="88" font-family="'Inter', sans-serif" font-size="12px" fill="#E2E8F0" font-weight="500">🚫 No raw user-id headers</text>
    <text x="20" y="108" font-family="'Inter', sans-serif" font-size="12px" fill="#E2E8F0" font-weight="500">🛡️ Token passed downstream</text>
    
    <!-- Wrapped this line to prevent overflow -->
    <text x="20" y="128" font-family="'Inter', sans-serif" font-size="11px" fill="#64748B">Prevents header spoofing</text>
    <text x="20" y="142" font-family="'Inter', sans-serif" font-size="11px" fill="#64748B">attacks from edge layers.</text>
  </g>

  <!-- STEP 3: DOWNSTREAM MICROSERVICE -->
  <g transform="translate(690, 60)" filter="url(#shadow)">
    <rect width="270" height="170" rx="12" fill="url(#cardBg)" stroke="#10B981" stroke-width="2" />
    <rect width="270" height="6" rx="3" fill="url(#greenTeal)" />
    <text x="20" y="32" class="title">3. Spring Boot Service</text>
    
    <text x="20" y="60" class="label">JWT Context Decoder:</text>
    <text x="20" y="80" font-family="'JetBrains Mono', monospace" font-size="11px" fill="#10B981" font-weight="bold">uid = jwt.getSubject()</text>
    
    <text x="20" y="110" class="label">Repository Level Binding:</text>
    <text x="20" y="130" font-family="'JetBrains Mono', monospace" font-size="10px" fill="#38BDF8">findByIdAndCreatedByUid(</text>
    <text x="35" y="148" font-family="'JetBrains Mono', monospace" font-size="10px" fill="#38BDF8">id, uid</text>
    <text x="20" y="156" font-family="'JetBrains Mono', monospace" font-size="10px" fill="#38BDF8">)</text>
  </g>

  <!-- STEP 4: DATASTORE ISOLATION -->
  <g transform="translate(30, 290)" filter="url(#shadow)">
    <rect width="940" height="90" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1.5" />
    <circle cx="35" cy="45" r="10" fill="#10B981" />
    
    <text x="65" y="35" font-family="'Outfit', 'Inter', sans-serif" font-size="14px" font-weight="700" fill="#F8FAFC">IDOR Protected by Design:</text>
    
    <!-- Multi-line text block to prevent horizontal overflow -->
    <text x="65" y="55" class="explanation">Since database queries mandate identity matching context bound from the JWT, a compromised edge</text>
    <text x="65" y="73" class="explanation">client cannot access or alter other users' feature configurations even if they forge resource IDs.</text>
  </g>
</svg>
