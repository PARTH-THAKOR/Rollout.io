<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 390" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="contextGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <linearGradient id="rulesGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
    <linearGradient id="resolutionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.9" />
    </linearGradient>
    
    <!-- Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <style>
    .title { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 14px; font-weight: 700; fill: #F8FAFC; }
    .label { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #94A3B8; font-weight: 500; }
    .payload-key { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #38BDF8; font-weight: bold; }
    .payload-val { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #FB7185; }
    .operator { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #F59E0B; font-weight: bold; }
    .arrow-text { font-family: 'Inter', system-ui, sans-serif; font-size: 10px; fill: #64748B; font-weight: 600; text-anchor: middle; }
    .status-pass { font-family: 'Inter', sans-serif; font-size: 9px; font-weight: bold; fill: #34D399; }
    .explanation { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; fill: #94A3B8; }
  </style>

  <!-- Background Canvas -->
  <rect width="1000" height="390" rx="16" fill="#0B1329" stroke="#1E293B" stroke-width="2" />

  <!-- Outer Grid Details -->
  <circle cx="50" cy="50" r="2" fill="#334155" />
  <circle cx="950" cy="50" r="2" fill="#334155" />
  <circle cx="50" cy="340" r="2" fill="#334155" />
  <circle cx="950" cy="340" r="2" fill="#334155" />

  <!-- Connector Lines -->
  <!-- Context Payload to Rules Engine -->
  <path d="M 270 135 L 330 135" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="3 3" />
  <polygon points="330,132 336,135 330,138" fill="#475569" />
  <text x="300" y="125" class="arrow-text">Evaluate</text>

  <!-- Rules Engine to Resolution -->
  <path d="M 710 135 L 770 135" fill="none" stroke="#10B981" stroke-width="2" />
  <polygon points="770,132 776,135 770,138" fill="#10B981" />
  <text x="740" y="125" class="arrow-text" style="fill: #10B981;">Resolves</text>


  <!-- STEP 1: CONTEXT PAYLOAD -->
  <g transform="translate(40, 50)" filter="url(#shadow)">
    <rect width="230" height="170" rx="10" fill="url(#cardBg)" stroke="#3B82F6" stroke-width="1.5" />
    <rect width="230" height="5" rx="2.5" fill="url(#contextGrad)" />
    <text x="15" y="28" class="title">1. Context Payload</text>
    <text x="15" y="45" class="label">Supplied by Client SDK</text>
    
    <!-- JSON Block -->
    <rect x="15" y="60" width="200" height="95" rx="6" fill="#020617" stroke="#1E293B" />
    <text x="25" y="78" font-family="monospace" font-size="11px" fill="#E2E8F0">{</text>
    
    <text x="35" y="96" class="payload-key">"email":</text>
    <text x="95" y="96" class="payload-val">"user@gmail.com"</text>
    
    <text x="35" y="114" class="payload-key">"country":</text>
    <text x="115" y="114" class="payload-val">"IN"</text>
    
    <text x="35" y="132" class="payload-key">"device":</text>
    <text x="105" y="132" class="payload-val">"mobile"</text>
    
    <text x="25" y="146" font-family="monospace" font-size="11px" fill="#E2E8F0">}</text>
  </g>

  <!-- STEP 2: RUNTIME TARGETING RULES -->
  <g transform="translate(330, 50)" filter="url(#shadow)">
    <rect width="380" height="170" rx="10" fill="url(#cardBg)" stroke="#F59E0B" stroke-width="1.5" />
    <rect width="380" height="5" rx="2.5" fill="url(#rulesGrad)" />
    <text x="15" y="28" class="title">2. Target Rules &amp; Operators</text>
    <text x="15" y="45" class="label">Evaluated sequentially (Logic Operator: AND)</text>
    
    <!-- Rules list -->
    <g transform="translate(15, 60)">
      <!-- Rule 1 -->
      <rect width="350" height="30" rx="4" fill="#020617" stroke="#1E293B" />
      <text x="10" y="20" class="payload-key">email</text>
      <text x="60" y="20" class="operator">CONTAINS</text>
      <text x="130" y="20" class="payload-val">"@gmail.com"</text>
      <rect x="290" y="6" width="50" height="18" rx="3" fill="#065F46" />
      <text x="298" y="18" class="status-pass">PASS</text>

      <!-- Rule 2 -->
      <rect y="38" width="350" height="30" rx="4" fill="#020617" stroke="#1E293B" />
      <text x="10" y="58" class="payload-key">country</text>
      <text x="75" y="58" class="operator">EQUALS</text>
      <text x="135" y="58" class="payload-val">"IN"</text>
      <rect x="290" y="44" width="50" height="18" rx="3" fill="#065F46" />
      <text x="298" y="56" class="status-pass">PASS</text>

      <!-- Rule 3 -->
      <rect y="76" width="350" height="24" rx="4" fill="#1E293B" />
      <text x="10" y="92" font-family="'Inter', sans-serif" font-size="10px" fill="#94A3B8">Linked Gateways: Rule 1 &amp;&amp; Rule 2 (All rules must match)</text>
    </g>
  </g>

  <!-- STEP 3: RESOLUTION -->
  <g transform="translate(770, 50)" filter="url(#shadow)">
    <rect width="190" height="170" rx="10" fill="url(#cardBg)" stroke="#10B981" stroke-width="2" />
    <rect width="190" height="5" rx="2.5" fill="url(#resolutionGrad)" />
    <text x="15" y="28" class="title">3. Evaluation</text>
    <text x="15" y="45" class="label">Resolves State</text>
    
    <circle cx="95" cy="100" r="30" fill="#065F46" stroke="#10B981" stroke-width="2" />
    <text x="95" y="104" font-family="'Outfit', sans-serif" font-size="12px" font-weight="900" fill="#34D399" text-anchor="middle">TRUE</text>
  </g>

  <!-- Explanation Banner (Increased height and adjusted vertical offsets) -->
  <g transform="translate(40, 270)" filter="url(#shadow)">
    <rect width="920" height="90" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1.5" />
    <circle cx="35" cy="45" r="10" fill="#10B981" />
    <text x="65" y="36" font-family="'Outfit', 'Inter', sans-serif" font-size="14px" font-weight="700" fill="#F8FAFC">Dynamic Context Rule Engine:</text>
    <text x="65" y="56" class="explanation">Targeting rules evaluate dynamically at execution time inside the SDK using user properties. There is no network overhead</text>
    <text x="65" y="74" class="explanation">since configuration schemas are cached locally and resolved in-memory against the runtime context payload.</text>
  </g>
</svg>
