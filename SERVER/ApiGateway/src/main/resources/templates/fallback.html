<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Service Unavailable - Rollout.io</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #060211;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --accent-red: rgba(180, 0, 0, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background: 
                radial-gradient(circle at 15% 40%, rgba(138, 43, 226, 0.12), transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(20, 60, 200, 0.12), transparent 45%),
                var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Star Background System */
        .stars {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-repeat: repeat;
            animation: starScroll linear infinite;
            z-index: -1;
        }

        .stars.small {
            background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='800' height='800'><circle cx='10' cy='20' r='1' fill='white'/><circle cx='200' cy='300' r='1' fill='white'/><circle cx='400' cy='100' r='1' fill='white'/><circle cx='600' cy='500' r='1' fill='white'/><circle cx='700' cy='200' r='1' fill='white'/><circle cx='150' cy='600' r='1' fill='white'/><circle cx='350' cy='700' r='1' fill='white'/></svg>");
            animation-duration: 40s;
            opacity: 0.9;
        }

        .stars.medium {
            background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='800' height='800'><circle cx='100' cy='200' r='2' fill='white'/><circle cx='500' cy='600' r='2' fill='white'/><circle cx='700' cy='300' r='2' fill='white'/><circle cx='300' cy='100' r='2' fill='white'/></svg>");
            animation-duration: 80s;
            opacity: 0.6;
        }

        .stars.large {
            background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='800' height='800'><circle cx='200' cy='400' r='3' fill='white'/><circle cx='600' cy='150' r='3' fill='white'/></svg>");
            animation-duration: 120s;
            opacity: 0.4;
        }

        @keyframes starScroll {
            from { background-position: 0 0; }
            to { background-position: 0 -800px; }
        }

        #cursor-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 60%);
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 0;
            mix-blend-mode: screen;
        }

        /* Hero Container (Boxless) */
        .hero-container {
            padding: 40px;
            width: 100%;
            max-width: 900px;
            text-align: center;
            z-index: 10;
            animation: contentAppear 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes contentAppear {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 28px;
            color: white;
            text-decoration: none;
            letter-spacing: -1.5px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .logo .dot {
            color: var(--accent-red);
        }

        .badge {
            display: inline-block;
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            font-family: 'Outfit', sans-serif;
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(80px, 15vw, 160px);
            font-weight: 900;
            line-height: 1;
            margin-bottom: 10px;
            letter-spacing: -5px;
            background: linear-gradient(135deg, #fff 0%, #71717a 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.2;
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(24px, 4vw, 42px);
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .gradient-text {
            background: linear-gradient(90deg, #ff4b4b, #4b83ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            text-align: center;
        }

        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: white;
            color: black;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .footer {
            position: absolute;
            bottom: 30px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 1px;
            text-align: center;
            width: 100%;
        }
    </style>
</head>

<body>
    <div id="cursor-glow"></div>
    <div class="stars small"></div>
    <div class="stars medium"></div>
    <div class="stars large"></div>

    <div class="hero-container">
        <div class="logo">Rollout<span class="dot">.</span>io</div>
        <br>
        <div class="badge">Backend Gateway</div>
        
        <h1>503</h1>
        <h2><span class="gradient-text" th:text="${serviceName}">Service</span> Unavailable</h2>
        
        <p>
            The backend node is currently experiencing high load or is temporarily 
            offline. Resilience4J Circuit Breaker has tripped to preserve system integrity. 
            Please attempt reconnection in a few moments.
        </p>

        <div class="actions">
            <button class="btn btn-primary" onclick="window.location.href='/'">Return Home</button>
            <button class="btn btn-outline" onclick="window.history.back()">Go Back</button>
        </div>
    </div>

    <div class="footer">
        MIT License • © 2026 TechParaglide.
    </div>

    <script>
        const glow = document.getElementById('cursor-glow');
        window.addEventListener('mousemove', e => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });
    </script>
</body>

</html>
