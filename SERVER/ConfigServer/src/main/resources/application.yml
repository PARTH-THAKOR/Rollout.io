# ===================================================================
# CONFIG SERVER CONFIGURATION (application.yml)
# ===================================================================

# ===================================================================
# Server Settings
# ===================================================================
server:
  port: 4998

# ===================================================================
# Spring Application Profiles
# ===================================================================
spring:
  application:
    name: ConfigServer
  profiles:
    active: dev-configserver

# ===================================================================
# Actuator Endpoints Configuration
# ===================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,encrypt,decrypt,busrefresh,prometheus
  metrics:
    tags:
      application: ConfigServer
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
