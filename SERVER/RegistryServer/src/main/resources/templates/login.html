<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Rollout.io Registry - Node Authentication</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #060211;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --accent-red: rgba(180, 0, 0, 1);
            --accent-red-glow: rgba(180, 0, 0, 0.4);
            --accent-blue: rgba(0, 60, 200, 1);
            --accent-blue-glow: rgba(0, 60, 200, 0.4);
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-border: rgba(255, 255, 255, 0.06);
            --input-bg: rgba(255, 255, 255, 0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background: 
                radial-gradient(circle at 15% 40%, rgba(138, 43, 226, 0.12), transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(20, 60, 200, 0.12), transparent 45%),
                radial-gradient(circle at 50% 80%, rgba(180, 0, 50, 0.08), transparent 50%),
                var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Star Background System */
        .stars {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-repeat: repeat;
            animation: starScroll linear infinite;
            z-index: -1;
        }

        .stars.small {
            background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='800' height='800'><circle cx='10' cy='20' r='1' fill='white'/><circle cx='200' cy='300' r='1' fill='white'/><circle cx='400' cy='100' r='1' fill='white'/><circle cx='600' cy='500' r='1' fill='white'/><circle cx='700' cy='200' r='1' fill='white'/><circle cx='150' cy='600' r='1' fill='white'/><circle cx='350' cy='700' r='1' fill='white'/></svg>");
            animation-duration: 40s;
            opacity: 0.9;
        }

        .stars.medium {
            background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='800' height='800'><circle cx='100' cy='200' r='2' fill='white'/><circle cx='500' cy='600' r='2' fill='white'/><circle cx='700' cy='300' r='2' fill='white'/><circle cx='300' cy='100' r='2' fill='white'/></svg>");
            animation-duration: 80s;
            opacity: 0.6;
        }

        .stars.large {
            background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='800' height='800'><circle cx='200' cy='400' r='3' fill='white'/><circle cx='600' cy='150' r='3' fill='white'/></svg>");
            animation-duration: 120s;
            opacity: 0.4;
        }

        @keyframes starScroll {
            from { background-position: 0 0; }
            to { background-position: 0 -800px; }
        }

        #cursor-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 60%);
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 0;
            mix-blend-mode: screen;
        }

        /* Authentication Container (Glass Effect) */
        .auth-container {
            padding: 60px 40px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(25px);
            border-radius: 24px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.4);
            animation: contentAppear 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes contentAppear {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            margin-bottom: 50px;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 32px;
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            letter-spacing: -1px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .logo .dot {
            color: var(--accent-red);
        }

        .badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-secondary);
            font-family: 'Outfit', sans-serif;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 48px;
            font-weight: 900;
            line-height: 1.1;
            margin-top: 30px;
            margin-bottom: 15px;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #fff 40%, rgba(255, 255, 255, 0.1) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-left: 4px;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            color: white;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(5px);
        }

        input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        button {
            width: 100%;
            padding: 18px;
            background: white;
            color: black;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(255, 255, 255, 0.15);
            background: #ffffff;
        }

        .footer {
            margin-top: 60px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <div id="cursor-glow"></div>
    <div class="stars small"></div>
    <div class="stars medium"></div>
    <div class="stars large"></div>

    <div class="auth-container" id="card">
        <div class="header">
            <div class="logo">Rollout<span class="dot">.</span>io</div>
            <br>
            <div class="badge">Ecosystem Registry</div>
        </div>

        <form method="post" action="/login">
            <div class="form-group">
                <label>Admin Username</label>
                <label>
                    <input type="text" name="username" placeholder="Enter node username..." required autocomplete="username">
                </label>
            </div>
            <div class="form-group">
                <label>Access Password</label>
                <label>
                    <input type="password" name="password" placeholder="••••••••••••" required autocomplete="current-password">
                </label>
            </div>
            <button type="submit">Verify Gateway Access</button>
        </form>

        <div class="footer">
            MIT License • © 2026 TechParaglide.
        </div>
    </div>

    <script>
        // Cursor Glow Follow
        const glow = document.getElementById('cursor-glow');
        window.addEventListener('mousemove', e => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });
    </script>
</body>

</html>
